# CampusConnect 360 — Orquestación de contenedores
# Paso 2: infraestructura base (broker + bases de datos) funcionando.
# Los microservicios y el frontend se irán habilitando en los pasos 3-8
# (bloques comentados al final, listos para descomentar).

name: campusconnect360

services:
  # ---------------------------------------------------------------
  # Mensajería: RabbitMQ con panel de administración
  # ---------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cc360-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Panel de administración (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-campus}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-campus123}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Persistencia: PostgreSQL con una base de datos por servicio
  # (creadas por infra/postgres/init/01-create-databases.sql)
  # ---------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: cc360-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Utilidad: cliente web para inspeccionar las bases (evidencia)
  # ---------------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: cc360-adminer
    ports:
      - "8081:8080"   # http://localhost:8081  (Sistema: PostgreSQL, Servidor: postgres)
    depends_on:
      postgres:
        condition: service_healthy
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Servicio Académico (Paso 3) — publica StudentEnrolled
  # ---------------------------------------------------------------
  academic-service:
    build: ./services/academic-service
    container_name: cc360-academic
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/academic_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-campus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-campus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-campus123}
    ports:
      - "8091:8080"   # http://localhost:8091/swagger-ui.html
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Servicio de Notificaciones (Paso 4) — consume eventos, notifica
  # ---------------------------------------------------------------
  notification-service:
    build: ./services/notification-service
    container_name: cc360-notification
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-campus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-campus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-campus123}
    ports:
      - "8093:8080"   # http://localhost:8093/swagger-ui.html
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Servicio de Analítica (Paso 4) — read model / CQRS del dashboard
  # ---------------------------------------------------------------
  analytics-service:
    build: ./services/analytics-service
    container_name: cc360-analytics
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-campus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-campus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-campus123}
    ports:
      - "8095:8080"   # http://localhost:8095/swagger-ui.html
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Servicio de Pagos (Paso 5) — publica PaymentConfirmed
  # ---------------------------------------------------------------
  payment-service:
    build: ./services/payment-service
    container_name: cc360-payment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-campus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-campus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-campus123}
    ports:
      - "8092:8080"   # http://localhost:8092/swagger-ui.html
    networks: [campus-net]

  # ---------------------------------------------------------------
  # Servicio de Asistencia/Bienestar (Paso 6)
  # ---------------------------------------------------------------
  attendance-service:
    build: ./services/attendance-service
    container_name: cc360-attendance
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/attendance_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-campus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-campus123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-campus}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-campus123}
    ports:
      - "8094:8080"   # http://localhost:8094/swagger-ui.html
    networks: [campus-net]

  # ---------------------------------------------------------------
  # API Gateway (Paso 8) — entrada única con JWT
  # ---------------------------------------------------------------
  api-gateway:
    build: ./services/api-gateway
    container_name: cc360-gateway
    depends_on:
      - academic-service
      - payment-service
      - notification-service
      - attendance-service
      - analytics-service
    environment:
      ACADEMIC_URI: http://academic-service:8080
      PAYMENT_URI: http://payment-service:8080
      NOTIFICATION_URI: http://notification-service:8080
      ATTENDANCE_URI: http://attendance-service:8080
      ANALYTICS_URI: http://analytics-service:8080
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-por-un-secreto-largo-de-al-menos-32-caracteres}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
    ports:
      - "8080:8080"   # entrada única del ecosistema
    networks: [campus-net]

  # ===============================================================
  # El frontend (Paso 7) se ejecuta con `pnpm dev` (puerto 3000) y su
  # proxy apunta al gateway (http://localhost:8080). Contenerizarlo
  # detrás de un nginx es una mejora opcional documentada.
  # ===============================================================

volumes:
  pgdata:

networks:
  campus-net:
    driver: bridge
